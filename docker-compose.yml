services:
  frontend:
    build:
      context: ./frontend
    container_name: rede-voluntaria-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  api:
    build: .
    container_name: rede-voluntaria-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rede_voluntaria
      JWT_SECRET: change-me-in-production
      SEED_ADMIN_EMAIL: admin@redevoluntariado.org.br
      SEED_ADMIN_PASSWORD: admin123
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: rede-voluntaria-postgres
    environment:
      POSTGRES_DB: rede_voluntaria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_python_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rede_voluntaria"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_python_data:
