services:
  api:
    build: .
    container_name: rede-voluntaria-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rede_voluntaria?schema=public
      PORT: 3333
      LOG_LEVEL: info
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: rede-voluntaria-postgres
    environment:
      POSTGRES_DB: rede_voluntaria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rede_voluntaria"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
